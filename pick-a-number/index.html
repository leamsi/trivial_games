<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick a Number — Trivial Games</title>
  <link rel="stylesheet" href="../common/style.css">
  <style>
    /* Game-specific styles */
    .guess-form {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      margin: var(--spacing-lg) 0;
    }

    .guess-input-group {
      display: flex;
      gap: var(--spacing-sm);
    }

    .guess-input {
      flex: 1;
    }

    .guess-btn {
      flex-shrink: 0;
      min-width: 100px;
    }

    .guesses-left {
      display: flex;
      justify-content: center;
      gap: var(--spacing-xs);
      margin-top: var(--spacing-md);
    }

    .guesses-left__pip {
      width: 12px;
      height: 12px;
      border-radius: var(--radius-full);
      background-color: var(--color-border);
      transition: background-color var(--transition-fast);
    }

    .guesses-left__pip--used {
      background-color: var(--color-primary);
    }

    .win-screen {
      text-align: center;
      padding: var(--spacing-xl);
    }

    .win-screen__emoji {
      font-size: 4rem;
      margin-bottom: var(--spacing-md);
    }

    .win-screen__title {
      color: var(--color-success);
      margin-bottom: var(--spacing-sm);
    }

    .win-screen__stats {
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-lg);
    }

    .lose-screen {
      text-align: center;
      padding: var(--spacing-xl);
    }

    .lose-screen__title {
      color: var(--color-warning);
      margin-bottom: var(--spacing-md);
    }

    .lose-screen__answer {
      font-size: var(--font-size-2xl);
      color: var(--color-primary);
      margin-bottom: var(--spacing-lg);
    }

    /* Confetti canvas overlay */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    /* Fallback bounce animation for win */
    .win-animation {
      animation: confetti-bounce 1s ease-in-out;
    }

    @keyframes confetti-bounce {
      0% { transform: scale(1); }
      25% { transform: scale(1.15) rotate(-5deg); }
      50% { transform: scale(1.2) rotate(5deg); }
      75% { transform: scale(1.1) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
  </style>
</head>
<body>
  <!-- Always visible restart button -->
  <button class="btn restart-btn" onclick="game.restart()" aria-label="Restart game">
    ↻ Restart
  </button>

  <!-- Back to game list -->
  <a href="../index.html" class="back-link">← Back to Trivial Games</a>

  <main class="game-card" id="game-container">
    <h1 class="game-card__title">🎯 Pick a Number</h1>
    <p class="text-muted">I'm thinking of a number between 1 and 1000. Can you guess it?</p>

    <!-- Input form -->
    <form class="guess-form" id="guess-form" onsubmit="game.handleGuess(event)">
      <div class="guess-input-group">
        <input
          type="number"
          id="guess-input"
          class="input guess-input"
          min="1"
          max="1000"
          placeholder="Enter 1-1000"
          inputmode="numeric"
          pattern="[0-9]*"
          required
          autocomplete="off"
          aria-label="Your guess"
        >
        <button type="submit" class="btn btn--primary guess-btn">Guess</button>
      </div>
    </form>

    <!-- Feedback area -->
    <div id="feedback-area" class="animate-fade-in" style="display: none;"></div>

    <!-- Guesses remaining display -->
    <div class="guesses-left" id="guesses-left" aria-live="polite">
      <!-- Pips will be generated by JS -->
    </div>

    <!-- Win screen (hidden initially) -->
    <div class="win-screen" id="win-screen" style="display: none;">
      <div class="win-screen__emoji" id="win-emoji">🎉</div>
      <h2 class="win-screen__title">You Got It!</h2>
      <p class="win-screen__stats" id="win-stats"></p>
      <button class="btn btn--success" onclick="game.restart()">Play Again</button>
    </div>

    <!-- Lose screen (hidden initially) -->
    <div class="lose-screen" id="lose-screen" style="display: none;">
      <h2 class="lose-screen__title">Out of Guesses!</h2>
      <p>The number was:</p>
      <div class="lose-screen__answer" id="lose-answer"></div>
      <button class="btn btn--primary" onclick="game.restart()">Try Again</button>
    </div>
  </main>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <script>
    /**
     * Pick-a-Number Game
     * A self-contained number guessing game with confetti celebration.
     */
    (function() {
      'use strict';

      const MAX_GUESSES = 10;
      const MIN_NUMBER = 1;
      const MAX_NUMBER = 1000;

      // Game state
      let targetNumber = 0;
      let guessesRemaining = MAX_GUESSES;
      let guessHistory = [];
      let gameOver = false;

      /**
       * Generate a random number between min and max (inclusive)
       */
      function getRandomNumber(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      /**
       * Update the guesses remaining pip display
       */
      function updatePips() {
        const container = document.getElementById('guesses-left');
        const usedPips = MAX_GUESSES - guessesRemaining;
        let html = '';
        for (let i = 0; i < MAX_GUESSES; i++) {
          const used = i < usedPips ? 'guesses-left__pip--used' : '';
          html += `<span class="guesses-left__pip ${used}" aria-hidden="true"></span>`;
        }
        container.innerHTML = html;
      }

      /**
       * Show feedback message
       */
      function showFeedback(message, type) {
        const feedbackArea = document.getElementById('feedback-area');
        feedbackArea.className = `feedback feedback--${type} animate-fade-in`;
        feedbackArea.textContent = message;
        feedbackArea.style.display = 'block';
      }

      /**
       * Hide feedback message
       */
      function hideFeedback() {
        document.getElementById('feedback-area').style.display = 'none';
      }

      /**
       * Calculate expected remaining guesses for current hint level
       */
      function getExpectedRemaining() {
        // ~10 - n where n is number of guesses made
        return MAX_GUESSES - guessHistory.length;
      }

      /**
       * Confetti animation using canvas
       */
      function launchConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#e94560', '#4ecca3', '#ffc107', '#0f3460', '#fff'];
        const particleCount = 150;

        // Create particles
        for (let i = 0; i < particleCount; i++) {
          particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 0.5) * 20 - 10,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: Math.random() * 8 + 4,
            rotation: Math.random() * 360,
            rotationSpeed: (Math.random() - 0.5) * 10,
            life: 1
          });
        }

        let animationId;
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          let alive = false;
          particles.forEach(p => {
            if (p.life <= 0) return;
            alive = true;

            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.5; // gravity
            p.rotation += p.rotationSpeed;
            p.life -= 0.01;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          });

          if (alive) {
            animationId = requestAnimationFrame(animate);
          } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.style.display = 'none';
          }
        }

        canvas.style.display = 'block';
        animate();

        // Clean up after animation
        setTimeout(() => {
          cancelAnimationFrame(animationId);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          canvas.style.display = 'none';
        }, 3000);
      }

      /**
       * Fallback CSS bounce animation if confetti fails
       */
      function fallbackBounceAnimation() {
        const container = document.getElementById('game-container');
        container.classList.add('win-animation');
        setTimeout(() => {
          container.classList.remove('win-animation');
        }, 1000);
      }

      /**
       * Trigger celebration
       */
      function celebrate() {
        try {
          launchConfetti();
        } catch (e) {
          // Fallback to CSS animation if canvas fails
          console.warn('Confetti failed, using fallback animation');
          fallbackBounceAnimation();
        }
      }

      /**
       * Handle player guess
       */
      function handleGuess(event) {
        event.preventDefault();

        if (gameOver) return;

        const input = document.getElementById('guess-input');
        const guess = parseInt(input.value, 10);

        // Input validation is handled by HTML5 attributes
        if (isNaN(guess) || guess < MIN_NUMBER || guess > MAX_NUMBER) {
          input.classList.add('input--error');
          showFeedback(`Please enter a number between ${MIN_NUMBER} and ${MAX_NUMBER}`, 'error');
          return;
        }

        input.classList.remove('input--error');
        guessesRemaining--;
        guessHistory.push(guess);

        if (guess === targetNumber) {
          // Win!
          gameOver = true;
          hideFeedback();
          celebrate();
          showWinScreen();
        } else if (guessesRemaining <= 0) {
          // Lose
          gameOver = true;
          hideFeedback();
          showLoseScreen();
        } else {
          // Continue
          const hint = guess < targetNumber ? 'higher' : 'lower';
          const remaining = getExpectedRemaining();
          showFeedback(
            `Go ${hint}! ${remaining} guesses remaining.`,
            'hint'
          );
          input.value = '';
          input.focus();
        }

        updatePips();
      }

      /**
       * Show win screen
       */
      function showWinScreen() {
        document.getElementById('guess-form').style.display = 'none';
        document.getElementById('guesses-left').style.display = 'none';

        const winScreen = document.getElementById('win-screen');
        const winStats = document.getElementById('win-stats');
        const attempts = guessHistory.length;
        const attemptsText = attempts === 1 ? '1 attempt' : `${attempts} attempts`;
        winStats.textContent = `You found ${targetNumber} in ${attemptsText}!`;

        winScreen.style.display = 'block';
      }

      /**
       * Show lose screen
       */
      function showLoseScreen() {
        document.getElementById('guess-form').style.display = 'none';
        document.getElementById('guesses-left').style.display = 'none';

        document.getElementById('lose-answer').textContent = targetNumber;
        document.getElementById('lose-screen').style.display = 'block';
      }

      /**
       * Restart the game
       */
      function restart() {
        targetNumber = getRandomNumber(MIN_NUMBER, MAX_NUMBER);
        guessesRemaining = MAX_GUESSES;
        guessHistory = [];
        gameOver = false;

        // Reset UI
        document.getElementById('guess-form').style.display = 'flex';
        document.getElementById('guesses-left').style.display = 'flex';
        document.getElementById('win-screen').style.display = 'none';
        document.getElementById('lose-screen').style.display = 'none';
        document.getElementById('guess-input').value = '';
        hideFeedback();
        updatePips();

        document.getElementById('guess-input').focus();
      }

      /**
       * Filter keydown events for valid input
       */
      function setupInputFilter() {
        const input = document.getElementById('guess-input');

        // Additional desktop keydown filter for extra robustness
        input.addEventListener('keydown', function(e) {
          // Allow: backspace, delete, tab, escape, enter, decimal point, minus
          // Allow: Ctrl+A, Ctrl+C, Ctrl+V, Ctrl+X
          const allowedKeys = [
            'Backspace', 'Delete', 'Tab', 'Escape', 'Enter',
            'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
            'Home', 'End'
          ];

          if (allowedKeys.includes(e.key)) return;

          if (e.ctrlKey || e.metaKey) {
            if (['a', 'c', 'v', 'x'].includes(e.key.toLowerCase())) return;
          }

          // Allow numbers
          if (e.key >= '0' && e.key <= '9') return;
          if (e.key === '-' && this.value === '') return;
          if (e.key === '.' && !this.value.includes('.')) return;

          // Block invalid keys
          e.preventDefault();
        });
      }

      /**
       * Initialize the game
       */
      function init() {
        setupInputFilter();
        restart();
      }

      // Expose game API for testing
      // getTarget and setTarget allow tests to verify behavior with known target values
      function getTarget() {
        return targetNumber;
      }

      function setTarget(value) {
        targetNumber = value;
      }

      window.game = {
        handleGuess,
        restart,
        getTarget,
        setTarget
      };

      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
