<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Flip — Trivial Games</title>
  <link rel="stylesheet" href="../common/style.css">
  <style>
    /* Game-specific styles */
    .bet-form {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      margin: var(--spacing-lg) 0;
    }

    .bet-input-group {
      display: flex;
      gap: var(--spacing-sm);
    }

    .bet-input {
      flex: 1;
    }

    .bet-all-btn {
      flex-shrink: 0;
      min-width: 90px;
    }

    .coin-buttons {
      display: flex;
      gap: var(--spacing-md);
      margin: var(--spacing-lg) 0;
    }

    .coin-btn {
      flex: 1;
      padding: var(--spacing-lg);
      font-family: var(--font-heading);
      font-size: 0.6rem;
      letter-spacing: 0.05em;
    }

    .cash-display {
      display: flex;
      justify-content: center;
      margin: var(--spacing-lg) 0;
      font-family: var(--font-heading);
      font-size: 0.8rem;
      color: var(--neon-green);
      text-shadow: var(--glow-neon-green);
    }

    .cash-change {
      font-family: var(--font-heading);
      font-size: 0.7rem;
      text-align: center;
      margin-bottom: var(--spacing-sm);
      min-height: 1.2em;
    }

    .cash-change--win {
      color: var(--color-success);
    }

    .cash-change--lose {
      color: var(--color-warning);
    }

    .flip-result {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      text-align: center;
      padding: var(--spacing-lg);
      margin: var(--spacing-lg) 0;
      color: var(--neon-cyan);
      text-shadow: var(--glow-neon-cyan);
    }

    .flip-result__amount {
      font-size: 0.7rem;
      margin-top: var(--spacing-sm);
    }

    .flip-result__amount--win {
      color: var(--color-success);
    }

    .flip-result__amount--lose {
      color: var(--color-warning);
    }

    .win-screen {
      text-align: center;
      padding: var(--spacing-xl);
    }

    .win-screen__emoji {
      font-size: 4rem;
      margin-bottom: var(--spacing-md);
    }

    .win-screen__title {
      color: var(--color-success);
      margin-bottom: var(--spacing-sm);
    }

    .win-screen__cash {
      color: var(--neon-green);
      margin-bottom: var(--spacing-lg);
      font-family: var(--font-heading);
      font-size: 0.8rem;
    }

    .lose-screen {
      text-align: center;
      padding: var(--spacing-xl);
    }

    .lose-screen__title {
      color: var(--color-warning);
      margin-bottom: var(--spacing-md);
    }

    .lose-screen__emoji {
      font-size: 3rem;
      margin-bottom: var(--spacing-md);
    }

    /* Confetti canvas overlay */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    /* Fallback bounce animation for win */
    .win-animation {
      animation: confetti-bounce 1s ease-in-out;
    }

    @keyframes confetti-bounce {
      0% { transform: scale(1); }
      25% { transform: scale(1.15) rotate(-5deg); }
      50% { transform: scale(1.2) rotate(5deg); }
      75% { transform: scale(1.1) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* 3D Coin styles */
    .coin-scene {
      perspective: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: var(--spacing-lg) 0;
      min-height: 160px;
    }

    .coin {
      width: 120px;
      height: 120px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
      margin: 0 auto;
    }

    .coin__face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-size: 2rem;
      backface-visibility: hidden;
      user-select: none;
    }

    .coin__face--front {
      background: var(--color-surface);
      border: 4px solid var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: var(--glow-neon-cyan);
    }

    .coin__face--back {
      background: var(--color-surface);
      border: 4px solid var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: var(--glow-neon-pink);
      transform: rotateY(180deg);
    }

    @keyframes coin-spin {
      0% { transform: rotateY(0deg) rotateX(15deg); }
      100% { transform: rotateY(1800deg) rotateX(15deg); }
    }

    .coin.flipping {
      animation: coin-spin 1.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    .coin.show-heads {
      transform: rotateY(0deg) rotateX(15deg);
    }

    .coin.show-tails {
      transform: rotateY(180deg) rotateX(15deg);
    }

    .play-again-btn {
      display: block;
      margin: var(--spacing-lg) auto;
    }
  </style>
</head>
<body>
  <!-- Always visible restart button -->
  <button class="btn restart-btn" onclick="game.restart()" aria-label="Restart game">
    ↻ Restart
  </button>

  <!-- Back to game list -->
  <a href="../index.html" class="back-link">← Back to Trivial Games</a>

  <main class="game-card" id="game-container">
    <h1 class="game-card__title">🪙 Coin Flip</h1>

    <!-- Cash change indicator (shown during animation) -->
    <div class="cash-change" id="cash-change" aria-live="polite"></div>

    <!-- Cash display -->
    <div class="cash-display" id="cash-display" aria-live="polite">
      Cash: $<span id="cash-value">10</span>
    </div>

    <!-- Bet form (shown during betting phase) -->
    <form class="bet-form" id="bet-form" onsubmit="game.handleBet(event)">
      <div class="bet-input-group">
        <input
          type="number"
          id="bet-input"
          class="input bet-input"
          min="1"
          placeholder="Enter bet amount"
          inputmode="numeric"
          pattern="[0-9]*"
          required
          autocomplete="off"
          aria-label="Bet amount"
        >
        <button type="button" class="btn btn--secondary bet-all-btn" onclick="game.betAll()">All In</button>
      </div>
      <button type="submit" class="btn btn--primary" id="bet-btn">Place Bet</button>
      <p class="text-muted" id="max-bet-hint">Max bet: $<span id="max-bet-value">10</span></p>
    </form>

    <!-- Heads/Tails selection (shown after bet) -->
    <div class="coin-buttons" id="coin-buttons" style="display: none;">
      <button class="btn btn--primary coin-btn" onclick="game.handleHeadsSelection()">HEADS</button>
      <button class="btn btn--primary coin-btn" onclick="game.handleTailsSelection()">TAILS</button>
    </div>

    <!-- 3D Coin display (shown during/after flip) -->
    <div class="coin-scene" id="coin-scene" style="display: none;">
      <div class="coin" id="coin">
        <div class="coin__face coin__face--front">H</div>
        <div class="coin__face coin__face--back">T</div>
      </div>
    </div>

    <!-- Flip result display (shown after flip) -->
    <div class="flip-result" id="flip-result" style="display: none;"></div>

    <!-- Play Again button (shown after flip result) -->
    <button class="btn btn--primary play-again-btn" id="play-again-btn" onclick="game.playAgain()" style="display: none;">Play Again</button>

    <!-- Win screen (hidden initially) -->
    <div class="win-screen" id="win-screen" style="display: none;">
      <div class="win-screen__emoji">🎉</div>
      <h2 class="win-screen__title">You Win!</h2>
      <p class="win-screen__cash" id="win-cash"></p>
      <button class="btn btn--success" onclick="game.playAgain(true)">Play Again</button>
    </div>

    <!-- Lose screen (hidden initially) -->
    <div class="lose-screen" id="lose-screen" style="display: none;">
      <div class="lose-screen__emoji">😢</div>
      <h2 class="lose-screen__title">You lost!</h2>
      <p class="text-muted">Better luck next time!</p>
      <button class="btn btn--primary mt-lg" onclick="game.playAgain(true)">Try Again</button>
    </div>
  </main>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <script>
    /**
     * Coin Flip Game
     * A self-contained coin flip betting game with confetti celebration.
     */
    (function() {
      'use strict';

      const STARTING_CASH = 10;
      const WIN_THRESHOLD = 1000;

      // Game state
      let cash = STARTING_CASH;
      let betAmount = 0;
      let playerChoice = null; // 'heads' or 'tails'
      let gamePhase = 'betting'; // 'betting' | 'choosing' | 'result' | 'gameover'
      let forcedFlipResult = null; // for testing

      /**
       * Update the cash display
       */
      function updateCashDisplay() {
        document.getElementById('cash-value').textContent = cash;
        document.getElementById('max-bet-value').textContent = cash;
      }

      /**
       * Show the betting UI
       */
      function showBettingUI() {
        document.getElementById('bet-form').style.display = 'flex';
        document.getElementById('coin-buttons').style.display = 'none';
        document.getElementById('flip-result').style.display = 'none';
        document.getElementById('win-screen').style.display = 'none';
        document.getElementById('lose-screen').style.display = 'none';
        updateCashDisplay();
      }

      /**
       * Show the heads/tails selection UI
       */
      function showChoosingUI() {
        document.getElementById('bet-form').style.display = 'none';
        document.getElementById('coin-buttons').style.display = 'flex';
        document.getElementById('flip-result').style.display = 'none';
      }

      /**
       * Handle bet form submission
       */
      function handleBet(event) {
        event.preventDefault();

        if (gamePhase !== 'betting') return;

        const input = document.getElementById('bet-input');
        const bet = parseInt(input.value, 10);

        // Input validation
        if (isNaN(bet) || bet <= 0) {
          input.classList.add('input--error');
          return;
        }

        if (bet > cash) {
          input.classList.add('input--error');
          return;
        }

        input.classList.remove('input--error');
        betAmount = bet;
        gamePhase = 'choosing';
        showChoosingUI();
      }

      /**
       * Bet all available cash
       */
      function betAll() {
        const input = document.getElementById('bet-input');
        input.value = cash;
      }

      /**
       * Handle heads selection
       */
      function handleHeadsSelection() {
        if (gamePhase !== 'choosing') return;
        playerChoice = 'heads';
        executeFlip();
      }

      /**
       * Handle tails selection
       */
      function handleTailsSelection() {
        if (gamePhase !== 'choosing') return;
        playerChoice = 'tails';
        executeFlip();
      }

      // Store the animationend handler reference for cleanup
      let coinAnimationHandler = null;
      let animationFallbackTimeout = null;
      let cashAnimationInterval = null;

      // Store pending cash change for after animation
      let pendingCashChange = null; // { won: bool, amount: number }
      let previousCash = STARTING_CASH;

      /**
       * Animate the cash counter from current value to target value
       * @param {number} from - Starting value
       * @param {number} to - Target value
       * @param {number} duration - Animation duration in ms
       */
      function animateCashCounter(from, to, duration) {
        const cashValueEl = document.getElementById('cash-value');
        const cashChangeEl = document.getElementById('cash-change');
        if (!cashValueEl || !cashChangeEl) return;

        const isWin = to > from;
        const steps = 20;
        const stepDuration = Math.max(20, duration / steps);
        const stepAmount = (to - from) / steps;
        let current = from;
        let step = 0;

        // Show change indicator
        cashChangeEl.textContent = isWin ? `+$${to - from}` : `-$${from - to}`;
        cashChangeEl.className = 'cash-change ' + (isWin ? 'cash-change--win' : 'cash-change--lose');

        if (cashAnimationInterval) {
          clearInterval(cashAnimationInterval);
        }

        cashAnimationInterval = setInterval(() => {
          step++;
          current = Math.round(from + stepAmount * step);

          if (step >= steps) {
            current = to;
            clearInterval(cashAnimationInterval);
            cashAnimationInterval = null;
            // Fade out the change indicator after a moment
            setTimeout(() => {
              if (cashChangeEl) {
                cashChangeEl.textContent = '';
                cashChangeEl.className = 'cash-change';
              }
            }, 1000);
          }

          if (cashValueEl) {
            cashValueEl.textContent = current;
          }
        }, stepDuration);
      }

      /**
       * Apply pending cash change with animation (called after coin animation ends)
       */
      function applyCashChange() {
        if (!pendingCashChange) return;

        const newCash = pendingCashChange.won ? previousCash + pendingCashChange.amount : previousCash - pendingCashChange.amount;
        animateCashCounter(previousCash, newCash, 600);
        cash = newCash;
        pendingCashChange = null;

        // Update max bet hint
        const maxBetEl = document.getElementById('max-bet-value');
        if (maxBetEl) {
          maxBetEl.textContent = cash;
        }
      }

      /**
       * Handle the coin animation ending — shows result face and text
       * @param {string} result - 'heads' or 'tails'
       */
      function handleCoinAnimationEnd(result) {
        const coin = document.getElementById('coin');
        if (!coin) return;

        coin.classList.remove('flipping');
        coin.classList.add(result === 'heads' ? 'show-heads' : 'show-tails');

        // Determine win/lose from pending cash change
        const won = pendingCashChange ? pendingCashChange.won : (result === playerChoice);
        const amount = pendingCashChange ? pendingCashChange.amount : betAmount;

        // Show result text below coin with win/loss amount
        const display = document.getElementById('flip-result');
        const amountClass = won ? 'flip-result__amount--win' : 'flip-result__amount--lose';
        const amountText = won ? `You WON +$${amount}` : `You LOST -$${amount}`;
        display.innerHTML = `It's ${result.toUpperCase()}!<div class="flip-result__amount ${amountClass}">${amountText}</div>`;
        display.style.display = 'block';

        // Apply the cash change with animation
        applyCashChange();

        // Show Play Again button
        document.getElementById('play-again-btn').style.display = 'block';

        // Check win/lose conditions — delay before showing game-over screens
        // so player can enjoy the flip result first
        if (cash >= WIN_THRESHOLD) {
          setTimeout(() => showWinScreen(), 1500);
        } else if (cash <= 0) {
          setTimeout(() => showLoseScreen(), 1500);
        }
      }

      /**
       * Perform the coin flip
       */
      function executeFlip() {
        // Determine flip result
        let flipResult;
        if (forcedFlipResult !== null) {
          flipResult = forcedFlipResult;
        } else {
          flipResult = Math.random() < 0.5 ? 'heads' : 'tails';
        }

        gamePhase = 'result';

        // Store current cash and pending change (applied after animation)
        previousCash = cash;
        const won = flipResult === playerChoice;
        pendingCashChange = { won, amount: betAmount };

        // Show coin scene and trigger spin animation
        const coinScene = document.getElementById('coin-scene');
        const coin = document.getElementById('coin');
        coinScene.style.display = 'flex';
        coin.classList.add('flipping');

        // Hide heads/tails selection buttons
        document.getElementById('coin-buttons').style.display = 'none';

        // Register animationend listener with stored reference for cleanup
        coinAnimationHandler = function(e) {
          handleCoinAnimationEnd(flipResult);
          coin.removeEventListener('animationend', coinAnimationHandler);
          coinAnimationHandler = null;
        };
        coin.addEventListener('animationend', coinAnimationHandler);

        // Fallback: force result display if animationend never fires
        animationFallbackTimeout = setTimeout(() => {
          if (coinAnimationHandler) {
            coin.removeEventListener('animationend', coinAnimationHandler);
            coinAnimationHandler = null;
          }
          handleCoinAnimationEnd(flipResult);
          animationFallbackTimeout = null;
        }, 2000);
      }

      /**
       * Show the flip result (delegates to animationend handler)
       */
      function showFlipResult(result) {
        handleCoinAnimationEnd(result);
      }

      /**
       * Show win screen with confetti
       */
      function showWinScreen() {
        gamePhase = 'gameover';
        document.getElementById('coin-scene').style.display = 'none';
        document.getElementById('coin-buttons').style.display = 'none';
        document.getElementById('flip-result').style.display = 'none';
        document.getElementById('play-again-btn').style.display = 'none';
        document.getElementById('win-cash').textContent = `You walked away with $${cash}!`;
        document.getElementById('win-screen').style.display = 'block';
        celebrate();
      }

      /**
       * Show lose screen
       */
      function showLoseScreen() {
        gamePhase = 'gameover';
        document.getElementById('coin-scene').style.display = 'none';
        document.getElementById('coin-buttons').style.display = 'none';
        document.getElementById('flip-result').style.display = 'none';
        document.getElementById('play-again-btn').style.display = 'none';
        document.getElementById('lose-screen').style.display = 'block';
      }

      /**
       * Play again - reset bet input and show betting UI
       * @param {boolean} resetCash - If true, reset cash to starting amount (for game over screens)
       */
      function playAgain(resetCash) {
        if (resetCash) {
          cash = STARTING_CASH;
          previousCash = STARTING_CASH;
        }
        betAmount = 0;
        playerChoice = null;
        gamePhase = 'betting';
        pendingCashChange = null;
        previousCash = STARTING_CASH;

        // Clear any pending animation handlers
        if (coinAnimationHandler) {
          const coin = document.getElementById('coin');
          if (coin) coin.removeEventListener('animationend', coinAnimationHandler);
          coinAnimationHandler = null;
        }
        if (animationFallbackTimeout !== null) {
          clearTimeout(animationFallbackTimeout);
          animationFallbackTimeout = null;
        }
        if (cashAnimationInterval !== null) {
          clearInterval(cashAnimationInterval);
          cashAnimationInterval = null;
        }

        // Clear cash change indicator
        const cashChangeEl = document.getElementById('cash-change');
        if (cashChangeEl) {
          cashChangeEl.textContent = '';
          cashChangeEl.className = 'cash-change';
        }

        // Reset coin to default (heads showing, no animation classes)
        const coin = document.getElementById('coin');
        if (coin) {
          coin.classList.remove('flipping', 'show-heads', 'show-tails');
        }

        // Reset coin scene to hidden
        document.getElementById('coin-scene').style.display = 'none';

        // Hide result display and play again button
        document.getElementById('flip-result').style.display = 'none';
        document.getElementById('play-again-btn').style.display = 'none';

        document.getElementById('bet-input').value = '';
        showBettingUI();
        document.getElementById('bet-input').focus();
      }

      /**
       * Full restart - reset everything including cash
       */
      function restart() {
        cash = STARTING_CASH;
        betAmount = 0;
        playerChoice = null;
        gamePhase = 'betting';
        forcedFlipResult = null;
        pendingCashChange = null;
        previousCash = STARTING_CASH;

        // Clear any pending animation handlers
        if (coinAnimationHandler) {
          const coin = document.getElementById('coin');
          if (coin) coin.removeEventListener('animationend', coinAnimationHandler);
          coinAnimationHandler = null;
        }
        if (animationFallbackTimeout !== null) {
          clearTimeout(animationFallbackTimeout);
          animationFallbackTimeout = null;
        }
        if (cashAnimationInterval !== null) {
          clearInterval(cashAnimationInterval);
          cashAnimationInterval = null;
        }

        // Clear cash change indicator
        const cashChangeEl = document.getElementById('cash-change');
        if (cashChangeEl) {
          cashChangeEl.textContent = '';
          cashChangeEl.className = 'cash-change';
        }

        // Reset coin to default (heads showing, no animation classes)
        const coin = document.getElementById('coin');
        if (coin) {
          coin.classList.remove('flipping', 'show-heads', 'show-tails');
        }

        // Hide all result/coin elements
        document.getElementById('coin-scene').style.display = 'none';
        document.getElementById('flip-result').style.display = 'none';
        document.getElementById('play-again-btn').style.display = 'none';

        showBettingUI();
        document.getElementById('bet-input').focus();
      }

      // ====== Testability API ======

      /**
       * Set cash directly (for testing)
       */
      function setCash(n) {
        cash = n;
        updateCashDisplay();
      }

      /**
       * Get current cash (for testing)
       */
      function getCash() {
        return cash;
      }

      /**
       * Force a specific flip result (for testing)
       */
      function setFlipResult(side) {
        forcedFlipResult = side;
      }

      /**
       * Trigger a flip programmatically (for testing)
       * Note: player must have already chosen heads/tails via handleHeadsSelection/handleTailsSelection
       */
      function flip() {
        executeFlip();
      }

      /**
       * Get current game phase (for testing)
       */
      function getPhase() {
        return gamePhase;
      }

      /**
       * Get coin element className for testing
       * Returns the class list of the coin element: 'coin', 'coin flipping', 'coin show-heads', etc.
       */
      function getCoinState() {
        const coin = document.getElementById('coin');
        return coin ? coin.className : '';
      }

      // ====== Confetti System ======

      /**
       * Confetti animation using canvas
       */
      function launchConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#e94560', '#4ecca3', '#ffc107', '#0f3460', '#fff', '#00ff41', '#ff00de', '#00e5ff'];
        const particleCount = 150;

        // Create particles
        for (let i = 0; i < particleCount; i++) {
          particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 0.5) * 20 - 10,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: Math.random() * 8 + 4,
            rotation: Math.random() * 360,
            rotationSpeed: (Math.random() - 0.5) * 10,
            life: 1
          });
        }

        let animationId;
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          let alive = false;
          particles.forEach(p => {
            if (p.life <= 0) return;
            alive = true;

            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.5; // gravity
            p.rotation += p.rotationSpeed;
            p.life -= 0.01;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          });

          if (alive) {
            animationId = requestAnimationFrame(animate);
          } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.style.display = 'none';
          }
        }

        canvas.style.display = 'block';
        animate();

        // Clean up after animation
        setTimeout(() => {
          cancelAnimationFrame(animationId);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          canvas.style.display = 'none';
        }, 3000);
      }

      /**
       * Fallback CSS bounce animation if confetti fails
       */
      function fallbackBounceAnimation() {
        const container = document.getElementById('game-container');
        container.classList.add('win-animation');
        setTimeout(() => {
          container.classList.remove('win-animation');
        }, 1000);
      }

      /**
       * Trigger celebration
       */
      function celebrate() {
        try {
          launchConfetti();
        } catch (e) {
          // Fallback to CSS animation if canvas fails
          console.warn('Confetti failed, using fallback animation');
          fallbackBounceAnimation();
        }
      }

      // ====== Input Filtering ======

      /**
       * Filter keydown events for valid input on desktop
       */
      function setupInputFilter() {
        const input = document.getElementById('bet-input');

        input.addEventListener('keydown', function(e) {
          // Allow: backspace, delete, tab, escape, enter
          const allowedKeys = [
            'Backspace', 'Delete', 'Tab', 'Escape', 'Enter',
            'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
            'Home', 'End'
          ];

          if (allowedKeys.includes(e.key)) return;

          if (e.ctrlKey || e.metaKey) {
            if (['a', 'c', 'v', 'x'].includes(e.key.toLowerCase())) return;
          }

          // Allow numbers
          if (e.key >= '0' && e.key <= '9') return;

          // Block invalid keys
          e.preventDefault();
        });
      }

      // ====== Initialization ======

      /**
       * Initialize the game
       */
      function init() {
        setupInputFilter();
        showBettingUI();
      }

      // Expose game API for testing
      window.coinFlipGame = {
        setCash,
        getCash,
        setFlipResult,
        flip,
        getPhase,
        getCoinState,
        betAll,
        handleBet,
        handleHeadsSelection,
        handleTailsSelection,
        playAgain,
        restart
      };

      // Expose shorthand for compatibility
      window.game = window.coinFlipGame;

      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
