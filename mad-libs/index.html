<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mad Libs — Trivial Games</title>
  <link rel="stylesheet" href="../common/style.css">
  <style>
    /* Mad Libs game-specific styles */
    .inputs-section {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      margin: var(--spacing-lg) 0;
    }

    .word-field {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
      text-align: left;
    }

    .word-field__label {
      font-family: var(--font-body);
      font-size: var(--font-size-lg);
      color: var(--neon-yellow);
      text-transform: capitalize;
    }

    .word-field__input {
      font-family: var(--font-body);
      font-size: var(--font-size-lg);
    }

    .result-display {
      margin: var(--spacing-xl) 0;
      padding: var(--spacing-lg);
      background-color: var(--color-bg);
      border: 2px solid var(--neon-green);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--font-size-xl);
      color: var(--neon-green);
      line-height: 1.5;
      text-align: center;
      box-shadow: var(--glow-neon-green);
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      margin-top: var(--spacing-lg);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Back to game list -->
  <a href="../index.html" class="back-link">← Back to Trivial Games</a>

  <main class="game-card">
    <h1 class="game-card__title">📝 Mad Libs</h1>
    <p class="text-muted">Fill in the blanks below, then submit to see the phrase!</p>

    <!-- Inputs section (populated by JS) -->
    <div class="inputs-section" id="inputs-section" aria-live="polite"></div>

    <!-- Submit + Another one buttons (always visible) -->
    <div class="action-buttons" id="action-buttons">
      <button
        class="btn btn--primary"
        id="submit-btn"
        onclick="madLibsGame.submit()"
        disabled
        aria-describedby="submit-hint"
      >
        Submit
      </button>
      <p id="submit-hint" class="sr-only">Fill in all fields to enable submit</p>
      <button class="btn btn--success" id="reroll-btn" onclick="madLibsGame.reroll()">
        🎲 Another one
      </button>
    </div>

    <!-- Result display (shown after submit) -->
    <div class="result-display hidden" id="result-display" aria-live="polite"></div>

        { template: "The [color] Dragon is the [superlative-ending-is-est] Dragon of all. It has [adjective] [body-part-plural], and a [body-part] shaped like a [noun]. It loves to eat [animal-plural], although it will feast on nearly anything. It is [adjective] and [adjective]. You must be [adjective] around it, or you may end up as it's meal!", placeholders: ["color", "superlative-ending-is-est", "adjective", "body-part-plural", "body-part", "noun", "animal-plural", "adjective", "adjective", "adjective"] },
        { template: "Look, I guarantee there'll be [adjective] times. I guarantee that at some [noun], [number] or both of us is gonna want to get out of this [noun]. But I also guarantee that if I don't ask you to be [adjective], I'll [verb] it for the rest of my [noun], because I know, in my [body-part], you're the [adjective] one for me.", placeholders: ["adjective", "noun", "number", "noun", "adjective", "verb", "noun", "body-part", "adjective"] },
        { template: "It was during the battle of [noun] when I was running through a [noun] when a [noun] went off right next to my platoon. Our [occupation] yelled for us to [verb] to the nearest [place] we could find. When we got to the [verb-ending-in-ed] we [noun] to start a fire. As we were starting the fire the enemy saw the [verb-ending-in-ing] from the fire and started [noun-plural] [noun] at us. we all quickly ducked behind the [emotion] at the and returned fire. we quickly eliminated the enemy and were that we had won the battle.", placeholders: ["noun", "noun", "noun", "occupation", "verb", "place", "verb-ending-in-ed", "noun", "verb-ending-in-ing", "noun-plural", "noun", "emotion"] },
        { template: "Two [noun-plural], both alike in dignity,In fair [place], where we lay our scene,From ancient [noun] break to new mutiny,Where civil blood makes civil hands unclean.From forth the fatal loins of these two foesA pair of star-cross'd [noun-plural] take their life;Whole misadventured piteous overthrowsDo with their [noun] bury their parents' strife.The fearful passage of their [adjective] love,And the continuance of their parents' rage,Which, but their children's end, nought could [verb],Is now the [number] hours' traffic of our stage;The which if you with [adjective] [body-part] attend,What here shall [verb], our toil shall strive to mend.", placeholders: ["noun-plural", "place", "noun", "noun-plural", "noun", "adjective", "verb", "number", "adjective", "body-part", "verb"] },
        { template: "Be kind to your [noun]-footed [noun-plural]For a duck may be somebody's [noun],Be kind to your [place] in [adjective]Where the weather is always [noun].", placeholders: ["noun", "noun-plural", "noun", "place", "adjective", "noun"] },
      ];

      // ── Game state ─────────────────────────────────────────────────────────────
      let phraseIndex = 0;
      let inputs = [];
      let isSubmitted = false;
      let resultText = '';

      // ── DOM helpers ────────────────────────────────────────────────────────────
      function getEl(id) {
        return document.getElementById(id);
      }

      function show(el) {
        if (typeof el === 'string') el = getEl(el);
        el.classList.remove('hidden');
      }

      function hide(el) {
        if (typeof el === 'string') el = getEl(el);
        el.classList.add('hidden');
      }

      // ── Core game logic ────────────────────────────────────────────────────────
      function pickRandomPhrase() {
        // Avoid picking the same phrase twice in a row
        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * PHRASES.length);
        } while (newIndex === phraseIndex && PHRASES.length > 1);
        return newIndex;
      }

      function renderInputs(placeholders) {
        const container = getEl('inputs-section');
        container.innerHTML = '';

        // Pre-populate inputs array so submit button stays disabled until all filled
        inputs = placeholders.map(function() { return ''; });

        placeholders.forEach(function(label, i) {
          // Create label
          var labelEl = document.createElement('label');
          labelEl.className = 'word-field__label';
          labelEl.htmlFor = 'word-' + i;
          labelEl.textContent = label.replace(/-/g, ' '); // "plural-noun" → "plural noun"

          // Create input
          var inputEl = document.createElement('input');
          inputEl.type = 'text';
          inputEl.id = 'word-' + i;
          inputEl.className = 'input word-field__input';
          inputEl.setAttribute('aria-label', 'Enter a ' + label.replace(/-/g, ' '));
          inputEl.setAttribute('inputmode', 'text');
          inputEl.setAttribute('autocomplete', 'off');
          inputEl.dataset.index = i;

          // Listen for input to enable/disable submit
          inputEl.addEventListener('input', function() {
            inputs[i] = inputEl.value;
            updateSubmitButton();
          });

          // Enter key moves to next input or submits
          inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              var next = container.querySelector('#word-' + (i + 1));
              if (next) {
                next.focus();
              } else if (!getEl('submit-btn').disabled) {
                madLibsGame.submit();
              }
            }
          });

          container.appendChild(labelEl);
          container.appendChild(inputEl);
        });

        // Focus first input
        setTimeout(function() {
          var first = getEl('word-0');
          if (first) first.focus();
        }, 50);
      }

      function updateSubmitButton() {
        var allFilled = inputs.length > 0 && inputs.every(function(v) {
          return v.trim().length > 0;
        });
        getEl('submit-btn').disabled = !allFilled;
      }

      function fillPhrase(template, placeholders) {
        var result = template;
        placeholders.forEach(function(placeholder, i) {
          var value = inputs[i] || '[' + placeholder + ']';
          // Replace each occurrence of [placeholder] with the value
          // Use a unique marker to avoid double-replacement
          result = result.replace('[' + placeholder + ']', value);
        });
        return result;
      }

      function handleSubmit() {
        if (isSubmitted) return;

        var phrase = PHRASES[phraseIndex];
        resultText = fillPhrase(phrase.template, phrase.placeholders);
        isSubmitted = true;

        // Show result
        var resultEl = getEl('result-display');
        resultEl.textContent = resultText;
        show(resultEl);

        // Hide inputs and submit button, keep reroll visible
        hide(getEl('inputs-section'));
        hide(getEl('submit-btn'));
      }

      function handleReroll() {
        phraseIndex = pickRandomPhrase();
        inputs = [];
        isSubmitted = false;
        resultText = '';

        var phrase = PHRASES[phraseIndex];
        renderInputs(phrase.placeholders);

        // Reset UI
        hide(getEl('result-display'));
        show(getEl('inputs-section'));
        show(getEl('submit-btn'));
        getEl('submit-btn').disabled = true;
      }

      // ── Public API ─────────────────────────────────────────────────────────────
      window.madLibsGame = {
        getPhrase: function() {
          return PHRASES[phraseIndex];
        },

        setPhrase: function(n) {
          if (n >= 0 && n < PHRASES.length) {
            phraseIndex = n;
            inputs = [];
            isSubmitted = false;
            resultText = '';

            var phrase = PHRASES[phraseIndex];
            renderInputs(phrase.placeholders);

            hide(getEl('result-display'));
            show(getEl('inputs-section'));
            show(getEl('submit-btn'));
            getEl('submit-btn').disabled = true;
          }
        },

        getInputs: function() {
          return inputs.slice();
        },

        submit: function() {
          handleSubmit();
        },

        reroll: function() {
          handleReroll();
        },

        reset: function() {
          handleReroll();
        }
      };

      // ── Init ───────────────────────────────────────────────────────────────────
      function init() {
        phraseIndex = pickRandomPhrase();
        inputs = [];
        var phrase = PHRASES[phraseIndex];
        renderInputs(phrase.placeholders);
        getEl('submit-btn').disabled = true;
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
