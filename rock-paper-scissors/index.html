<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors — Trivial Games</title>
  <link rel="stylesheet" href="../common/style.css">
  <style>
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }
    .choice-buttons {
      display: flex;
      justify-content: center;
      gap: var(--spacing-md);
      margin: var(--spacing-lg) 0;
    }
    .choice-btn {
      padding: var(--spacing-lg);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .animation-scene {
      font-size: 4rem;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: var(--spacing-lg) 0;
      color: var(--neon-cyan);
      text-shadow: var(--glow-neon-cyan);
    }
    .result-display {
      font-family: var(--font-heading);
      font-size: 1rem;
      text-align: center;
      margin: var(--spacing-lg) 0;
      color: var(--neon-yellow);
      text-shadow: 0 0 10px rgba(255, 230, 0, 0.6);
    }
    .result-showcase {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-lg);
      margin: var(--spacing-lg) 0;
      font-size: 3rem;
    }
    .result-showcase__choice {
      padding: var(--spacing-md);
      border-radius: var(--radius-md);
      transition: all var(--transition-base);
    }
    .result-showcase__choice--winner {
      color: var(--neon-green);
      text-shadow: var(--glow-neon-green);
      transform: scale(1.2);
    }
    .result-showcase__choice--loser {
      opacity: 0.4;
      transform: scale(0.9);
    }
    .result-showcase__vs {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }
    .result-message {
      font-family: var(--font-heading);
      font-size: 0.7rem;
      margin-bottom: var(--spacing-md);
    }
    .result-message--win {
      color: var(--neon-green);
      text-shadow: var(--glow-neon-green);
    }
    .result-message--lose {
      color: var(--neon-pink);
      text-shadow: var(--glow-neon-pink);
    }
    .result-message--tie {
      color: var(--neon-yellow);
      text-shadow: 0 0 10px rgba(255, 230, 0, 0.6);
    }
    .play-again-btn, .restart-btn {
      display: block;
      margin-top: var(--spacing-md);
    }
    .score-display {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      color: var(--neon-green);
      margin-top: var(--spacing-md);
    }
  </style>
</head>
<body>
  <button class="btn restart-btn" onclick="game.reset()" aria-label="Restart game">
    ↻ Restart
  </button>
  <a href="../index.html" class="back-link">← Back to Trivial Games</a>

  <main class="game-card">
    <h1 class="game-card__title">🪨📄✂️ RPS</h1>

    <div class="score-display" id="score-display">
      Wins: <span id="wins">0</span> | Played: <span id="played">0</span>
    </div>

    <div class="choice-buttons" id="choice-buttons">
      <button class="btn choice-btn" onclick="game.handleChoice('rock')">🪨</button>
      <button class="btn choice-btn" onclick="game.handleChoice('paper')">📄</button>
      <button class="btn choice-btn" onclick="game.handleChoice('scissors')">✂️</button>
    </div>

    <div class="animation-scene" id="animation-scene" style="display: none;"></div>

    <div id="result-container" style="display: none;">
      <div class="result-message" id="result-message"></div>
      <div class="result-showcase" id="result-showcase">
        <span class="result-showcase__choice" id="player-choice"></span>
        <span class="result-showcase__vs">vs</span>
        <span class="result-showcase__choice" id="computer-choice"></span>
      </div>
    </div>

    <button class="btn btn--primary play-again-btn" id="play-again-btn" onclick="game.playAgain()" style="display: none;">Play Again</button>
  </main>

  <script>
    (function() {
      'use strict';

      let wins = 0;
      let played = 0;
      let gamePhase = 'picking'; // 'picking' | 'animating' | 'result'
      let forcedResult = null; // for testing

      const choices = ['rock', 'paper', 'scissors'];
      const emojis = { rock: '🪨', paper: '📄', scissors: '✂️' };

      function updateScore() {
        document.getElementById('wins').textContent = wins;
        document.getElementById('played').textContent = played;
      }

      function handleChoice(choice) {
        if (gamePhase !== 'picking') return;
        gamePhase = 'animating';
        document.getElementById('choice-buttons').style.display = 'none';
        animateChoice(choice);
      }

      function animateChoice(playerChoice) {
        const scene = document.getElementById('animation-scene');
        scene.style.display = 'flex';
        let count = 0;
        const interval = setInterval(() => {
          scene.textContent = emojis[choices[count % 3]];
          count++;
          if (count > 10) {
            clearInterval(interval);
            showResult(playerChoice);
          }
        }, 100);
      }

      function showResult(playerChoice) {
        const computerChoices = ['rock', 'paper', 'scissors'];
        const computerChoice = forcedResult || computerChoices[Math.floor(Math.random() * 3)];
        
        played++;
        let result = '';
        let outcome = 'tie'; // 'win', 'lose', 'tie'
        
        if (playerChoice === computerChoice) {
          result = 'Tie!';
          outcome = 'tie';
        } else if (
          (playerChoice === 'rock' && computerChoice === 'scissors') ||
          (playerChoice === 'paper' && computerChoice === 'rock') ||
          (playerChoice === 'scissors' && computerChoice === 'paper')
        ) {
          wins++;
          result = `${capitalize(playerChoice)} beats ${computerChoice}!`;
          outcome = 'win';
        } else {
          result = `${capitalize(computerChoice)} beats ${playerChoice}!`;
          outcome = 'lose';
        }

        function capitalize(str) {
          return str.charAt(0).toUpperCase() + str.slice(1);
        }

        document.getElementById('animation-scene').style.display = 'none';
        
        // Update result message
        const messageEl = document.getElementById('result-message');
        messageEl.textContent = result;
        messageEl.className = 'result-message';
        if (outcome === 'win') {
          messageEl.classList.add('result-message--win');
          messageEl.textContent = 'You Win! ' + result;
        } else if (outcome === 'lose') {
          messageEl.classList.add('result-message--lose');
          messageEl.textContent = 'You Lose! ' + result;
        } else {
          messageEl.classList.add('result-message--tie');
        }
        
        // Update showcase with emojis
        const playerEl = document.getElementById('player-choice');
        const computerEl = document.getElementById('computer-choice');
        playerEl.textContent = emojis[playerChoice];
        computerEl.textContent = emojis[computerChoice];
        
        // Apply winner/loser styling
        playerEl.className = 'result-showcase__choice';
        computerEl.className = 'result-showcase__choice';
        
        if (outcome === 'win') {
          playerEl.classList.add('result-showcase__choice--winner');
          computerEl.classList.add('result-showcase__choice--loser');
        } else if (outcome === 'lose') {
          computerEl.classList.add('result-showcase__choice--winner');
          playerEl.classList.add('result-showcase__choice--loser');
        }
        // For ties, both stay neutral (no extra classes)
        
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('play-again-btn').style.display = 'block';
        updateScore();
        gamePhase = 'result';
      }

      function playAgain() {
        gamePhase = 'picking';
        document.getElementById('choice-buttons').style.display = 'flex';
        document.getElementById('result-container').style.display = 'none';
        document.getElementById('play-again-btn').style.display = 'none';
        forcedResult = null;
      }

      function reset() {
        wins = 0;
        played = 0;
        updateScore();
        playAgain();
      }

      // API for testability
      window.rockPaperScissorsGame = {
        handleChoice,
        playAgain,
        reset,
        getScore: () => ({ wins, played }),
        setResult: (choice) => forcedResult = choice, // Force computer choice
        setTarget: (choice) => forcedResult = choice, // Alias
        getTarget: () => forcedResult // Alias
      };
      window.game = window.rockPaperScissorsGame;
    })();
  </script>
</body>
</html>
